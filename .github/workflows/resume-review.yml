name: Résumé LLM review (advisory)

on:
  pull_request:
    paths:
      - "docs/**/*.md"

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base branch for the diff

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Deterministic guardrails
        run: npm run validate

      - name: LLM review (advisory)
        run: node resume/llm-review.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Set to "high" to block the PR on high-severity findings.
          REVIEW_FAIL_ON: ""
